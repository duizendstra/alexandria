version: "2"

# Consumer lint profile — for application and composition-root repos
# (Pulumi stacks, services, CLIs) that consume library modules.
#
# Same quality bar as library.golangci.yml, with two differences:
# dependencies are restricted to stdlib + vetted library modules only
# (application logic belongs in libraries, not composition roots), and
# complexity limits are tighter (a composition root that needs a big
# function is hiding a library).
#
# Copy to the repo root as .golangci.yml and adjust the marked section.

run:
  timeout: 10m
  concurrency: 4
  modules-download-mode: readonly

output:
  sort-order:
    - file
    - linter

linters:
  enable:
    # ── 1. Core Safety & Bugs ──
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - bodyclose
    - noctx
    - nilerr
    - errorlint
    - fatcontext
    - reassign
    - nilnesserr
    - contextcheck
    - forcetypeassert
    - nilnil
    - wastedassign
    - copyloopvar
    - durationcheck
    - makezero
    - asasalint
    - containedctx
    - canonicalheader
    - errchkjson
    - exhaustive

    # ── 2. Style & Idioms ──
    - revive
    - gocritic
    - goconst
    - unconvert
    - misspell
    - usestdlibvars
    - dupl
    - predeclared
    - godot
    - whitespace
    - nakedret
    - nonamedreturns
    - nlreturn
    - dupword
    - errname
    - dogsled
    - unparam
    - grouper
    - funcorder
    - recvcheck
    - godoclint
    - prealloc
    - decorder
    - musttag

    # ── 3. Complexity ──
    - cyclop
    - funlen
    - nestif
    - maintidx

    # ── 4. Architecture ──
    - gosec
    - depguard
    - ireturn
    - gomoddirectives
    - gochecknoglobals
    - gochecknoinits

    # ── 5. Security ──
    - asciicheck
    - bidichk
    - gocheckcompilerdirectives
    - nosprintfhostport

    # ── 6. Structured Logging ──
    - sloglint
    - loggercheck

    # ── 7. Testing ──
    - testifylint
    - usetesting
    - thelper

    # ── 8. Modernization ──
    - intrange
    - modernize
    - protogetter
    - perfsprint
    - exptostd

    # ── 9. Quality ──
    - lll

    # ── 10. Meta ──
    - nolintlint
    - forbidigo
    - mnd
    - wrapcheck
    - goprintffuncname
    - err113
    - mirror

  settings:
    # Tight limits — composition roots stay thin by construction.
    funlen:
      lines: 80
      statements: 40
    cyclop:
      max-complexity: 10
      package-average: 0.0
    nestif:
      min-complexity: 4
    maintidx:
      under: 20
    nakedret:
      max-func-lines: 0
    lll:
      line-length: 120

    revive:
      rules:
        - name: package-comments
        - name: error-naming
        - name: error-strings
        - name: error-return
        - name: var-naming
        - name: receiver-naming

    depguard:
      rules:
        main:
          # ADJUST: stdlib + your vetted library modules only. If a
          # composition root needs another external dependency, the
          # code that uses it belongs in a library module instead.
          list-mode: strict
          files:
            - "$all"
          allow:
            - $gostd
            - github.com/duizendstra/alexandria/go

    ireturn:
      allow:
        - anon
        - error
        - empty
        - stdlib
        - generic

    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance

    sloglint:
      attr-only: true
      key-naming-case: snake

    testifylint:
      enable-all: true

    nolintlint:
      allow-unused: false
      require-explanation: true
      require-specific: true

    gomoddirectives:
      replace-local: false

    godot:
      scope: all

    forbidigo:
      forbid:
        - pattern: "^log\\.(Print|Fatal|Panic).*$"
          msg: "use log/slog for structured logging"

  exclusions:
    rules:
      # Tests — relaxed for readability and test patterns.
      - path: .*_test\.go
        linters:
          - depguard
          - gochecknoglobals
          - gosec
          - errcheck
          - testpackage
          - nonamedreturns
          - nilerr
          - paralleltest
          - wrapcheck
          - err113
          - nlreturn
          - ireturn
          - funlen
          - cyclop
          - maintidx
          - containedctx

      # context.Err() is idiomatically returned unwrapped.
      - linters: [wrapcheck]
        source: "return ctx\\.Err\\(\\)"

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
