// Service health observability — reports the running state of services
// across all deployment scopes (local, cloud).
//
// Domain:  Deployment
// Concern: What is the health state of services?

syntax = "proto3";

package deployment.status.v1alpha1;

option go_package = "github.com/duizendstra/alexandria/go/contracts/deployment/status/v1alpha1;statusv1alpha1";

// Scope distinguishes where a service runs.
enum Scope {
  // Default value.
  SCOPE_UNSPECIFIED = 0;
  // Local service managed by the OS (e.g. launchd).
  SCOPE_LOCAL = 1;
  // Cloud service (e.g. Cloud Run, GKE).
  SCOPE_CLOUD = 2;
}

// ServiceHealth is the observed state of a single service.
message ServiceHealth {
  // Unique service name (e.g. "kratos-api").
  string name = 1;
  // Where the service runs.
  Scope scope = 2;
  // True if the service process is alive.
  bool running = 3;
  // True if the health endpoint responds OK.
  bool healthy = 4;
  // Process ID (local services only).
  string pid = 5;
  // Human-readable detail (e.g. "exit: not loaded").
  string detail = 6;
}

// StatusService reports the health of services across all deployment scopes.
service StatusService {
  // CheckHealth returns the health of all registered services.
  rpc CheckHealth(CheckHealthRequest) returns (CheckHealthResponse);
}

// CheckHealthRequest requests a health check across all scopes.
message CheckHealthRequest {}

// CheckHealthResponse contains health for all services.
message CheckHealthResponse {
  // Health state of each service.
  repeated ServiceHealth services = 1;
}
