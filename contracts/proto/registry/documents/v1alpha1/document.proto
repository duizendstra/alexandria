// Document registry types for the Alexandria knowledge library.
// Formalizes a unit of epistemic knowledge — the contract for
// Markdown YAML frontmatter.
//
// See: library/docs/architecture/adr-document-proto-ontology.md

syntax = "proto3";

package registry.documents.v1alpha1;

option go_package = "github.com/duizendstra/alexandria/go/contracts/registry/documents/v1alpha1;documentsv1alpha1";

// Document formalizes a unit of epistemic knowledge within Alexandria.
// It acts as the strict contract for Markdown YAML frontmatter.
// The markdown body is the implicit content field — not stored in
// frontmatter, it IS the file body.
message Document {
  // --- IDENTITY ---

  // The universal identifier formatted as an AIP-122 Resource Name.
  // Format: "documents/{uuid}"
  string name = 1;

  // Human-readable title. Noun phrase (explanation), action verb (tutorial).
  // Validated per Diátaxis quadrant.
  string title = 2;

  // 1-2 sentence TL;DR. Critical for RAG — allows indexing without
  // reading full body.
  string summary = 3;

  // Unstructured keywords. Cast a wider net beyond the rigid domain taxonomy.
  repeated string tags = 4;

  // --- CLASSIFICATION ---

  // The business domain this knowledge belongs to.
  // Typed as a string to allow fluidity in organizational taxonomy
  // without recompiling the Protobuf contract.
  // Validated at CI time against a dynamic taxonomy configuration file.
  string domain = 5;

  // The structural archetype — what the document IS.
  // Defines template governance (e.g., an ADR requires Context, Decision,
  // Consequences sections; a Scorecard requires metrics).
  // Values: adr, concept, playbook, scorecard, rule, guide, reference
  string type = 6;

  // The pedagogical consumption mode — how the document IS consumed.
  // Based on the Diátaxis framework (Theory/Practice × Acquisition/Application).
  // Values: explanation, tutorial, how_to, reference
  string diataxis_quadrant = 7;

  // --- LIFECYCLE (Intrinsic State) ---

  // Whether the document is currently available and valid for consumption.
  // Models the internal state machine of the knowledge asset.
  // Values: draft, active, deprecated, superseded
  string status = 8;

  // How strictly the practice should adhere to this knowledge.
  // Epistemological confidence level, independent from status.
  // Values: proposal, emerging, standard, legacy
  string maturity = 9;

  // --- PROVENANCE ---

  // GitHub handle of governing author/team.
  // Validated against GitHub API or CODEOWNERS.
  string owner = 10;

  // ISO-8601 UTC date string. Validated against git log --diff-filter=A.
  string created_at = 11;

  // ISO-8601 UTC date string. Must be bumped on modification.
  // Validated against git log -1.
  string updated_at = 12;

  // --- EPISTEMIC GRAPH (Open-Closed Principle) ---
  //
  // Outgoing edges only, formalizing assertions made BY this document.
  // Uses AIP-122 Resource Names to maintain type safety.
  //
  // Inverse edges (children, superseded_by) are permanently omitted.
  // They are computed at read-time by the catalog engine via graph reversal,
  // not stored as intrinsic state. Forcing authors to update older documents
  // when new documents are created violates the Open-Closed Principle.

  // skos:broader — foundational concepts this document builds upon.
  repeated string parents = 13;

  // prov-o:wasRevisionOf — legacy standards this document replaces.
  repeated string supersedes = 14;

  // skos:related — associative/lateral links.
  // Replaces the bidirectional 'siblings' concept.
  repeated string related = 15;

  // --- CROSS-CONTEXT LINKS ---

  // Bridges Epistemology (Knowledge) to Execution (Artifacts, Customers, Processes).
  // E.g., ["artifacts/alexandria-cli", "customers/acme-corp", "processes/onboarding"]
  repeated string related_resources = 16;
}
