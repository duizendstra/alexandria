//
// Sentinel error codes for all API interactions.
// Go package apierr maps these to sentinel error values.

syntax = "proto3";

package foundation.errors.v1alpha1;

option go_package = "github.com/duizendstra/alexandria/go/contracts/foundation/errors/v1alpha1;errorsv1alpha1";

// ErrorCode enumerates every failure mode for vendor and internal API calls.
// Consumers use these codes to decide on retry, backoff, or abort.
enum ErrorCode {
  // Default value — no error.
  ERROR_CODE_UNSPECIFIED = 0;

  // HTTP status errors.

  // The API rejected the token (HTTP 401).
  ERROR_CODE_UNAUTHORIZED = 1;
  // The token lacks required permissions (HTTP 403).
  ERROR_CODE_FORBIDDEN = 2;
  // The requested resource does not exist (HTTP 404).
  ERROR_CODE_NOT_FOUND = 3;
  // The API throttled the request (HTTP 429).
  ERROR_CODE_RATE_LIMITED = 4;
  // The server returned a 5xx response.
  ERROR_CODE_SERVER_ERROR = 5;
  // Any other non-2xx status.
  ERROR_CODE_UNEXPECTED_STATUS = 6;

  // Client behavior errors.

  // All retry attempts were exhausted.
  ERROR_CODE_RETRIES_EXCEEDED = 7;
  // Authentication failed (token exchange, refresh, etc.).
  ERROR_CODE_AUTH_FAILED = 8;
  // The vendor API indicated a logical failure in its response envelope
  // (e.g. success=false).
  ERROR_CODE_API_ERROR = 9;

  // Client input validation failed (HTTP 400 / INVALID_ARGUMENT).
  ERROR_CODE_INVALID_INPUT = 10;
  // Request timed out (HTTP 408 / DEADLINE_EXCEEDED).
  ERROR_CODE_TIMEOUT = 11;
  // Resource conflict occurred (HTTP 409 / ALREADY_EXISTS).
  ERROR_CODE_CONFLICT = 12;
}
