//
// Spoke sync — async replication between spoke (local) and hub (GitHub).
// Handles pull (reconcile), push (branch), PR (create), merge (rebase),
// and inside-out submodule ordering.
//
// Domain:  Development
// Concern: How do we sync code between spokes and the hub?

syntax = "proto3";

package development.sync.v1;

option go_package = "github.com/duizendstra/alexandria/go/contracts/development/sync/v1;syncv1";

// SyncService manages spoke-to-hub code replication.
service SyncService {
  // Sync performs the full spoke→hub replication: pull, push, PR, merge.
  rpc Sync(SyncRequest) returns (SyncResponse);

  // Status reports the sync state of a spoke.
  rpc Status(StatusRequest) returns (StatusResponse);

  // Resolve resolves a sync conflict or failure.
  rpc Resolve(ResolveRequest) returns (ResolveResponse);
}

// SyncRequest initiates a spoke→hub sync.
message SyncRequest {
  // Absolute path to the repository root.
  string repo_path = 1;
  // Spoke identifier (e.g. hostname, agent ID).
  string spoke_id = 2;
  // When true, also sync submodules inside-out before the parent.
  bool include_submodules = 3;
}

// SyncResponse reports the outcome of a sync operation.
message SyncResponse {
  // Overall sync status.
  SyncStatus status = 1;
  // Human-readable summary.
  string summary = 2;
  // Per-repo sync results (root + submodules).
  repeated RepoSyncResult repos = 3;
}

// SyncStatus is the overall outcome of a sync.
enum SyncStatus {
  SYNC_STATUS_UNSPECIFIED = 0;
  // All repos synced and merged successfully.
  SYNC_STATUS_COMPLETE = 1;
  // Sync in progress (async — PR created, CI running).
  SYNC_STATUS_PENDING = 2;
  // Pull --rebase hit a conflict that needs manual resolution.
  SYNC_STATUS_CONFLICT = 3;
  // CI failed on the sync branch.
  SYNC_STATUS_CI_FAILED = 4;
  // Push or PR creation failed.
  SYNC_STATUS_ERROR = 5;
}

// RepoSyncResult is the sync outcome for a single repository.
message RepoSyncResult {
  // Repo path (relative, e.g. "alexandria" or "." for root).
  string path = 1;
  // Sync status for this repo.
  SyncStatus status = 2;
  // Number of local commits being synced.
  int32 commits_ahead = 3;
  // Number of hub commits pulled (rebased onto).
  int32 commits_behind = 4;
  // Sync branch name (e.g. "sync/antigravity-1711360000").
  string branch = 5;
  // PR URL if created.
  string pr_url = 6;
  // Conflict details if status is CONFLICT.
  repeated ConflictDetail conflicts = 7;
  // Error message if status is ERROR.
  string error = 8;
}

// ConflictDetail describes a single file conflict during rebase.
message ConflictDetail {
  // File path (relative to repo root).
  string file = 1;
  // Conflict type (e.g. "both_modified", "deleted_by_them").
  string conflict_type = 2;
}

// StatusRequest queries a spoke's current sync state.
message StatusRequest {
  // Absolute path to the repository root.
  string repo_path = 1;
  // Spoke identifier.
  string spoke_id = 2;
}

// StatusResponse reports the current sync state.
message StatusResponse {
  // Commits ahead of remote (not yet synced).
  int32 commits_ahead = 1;
  // Commits behind remote (need pull).
  int32 commits_behind = 2;
  // Pending PRs from this spoke.
  repeated PendingPR pending_prs = 3;
  // Last successful sync timestamp (RFC 3339).
  string last_sync = 4;
}

// PendingPR is a sync PR that hasn't merged yet.
message PendingPR {
  string url = 1;
  string branch = 2;
  // One of: open, ci_running, ci_passed, ci_failed, merged.
  string state = 3;
}

// ResolveRequest resolves a sync conflict or retries a failed sync.
message ResolveRequest {
  string repo_path = 1;
  string spoke_id = 2;
  // One of: "retry" (re-push), "abort" (abandon sync branch).
  string action = 3;
}

// ResolveResponse confirms the resolution.
message ResolveResponse {
  SyncStatus status = 1;
  string summary = 2;
}
