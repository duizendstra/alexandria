// Development tooling — mechanical code evolution operations
// that change the codebase structure.
//
// Domain:  Development
// Concern: How do we evolve the codebase?

syntax = "proto3";

package development.tools.v1alpha1;

option go_package = "github.com/duizendstra/alexandria/go/contracts/development/tools/v1alpha1;toolsv1alpha1";

// ToolsService provides mechanical code evolution operations.
service ToolsService {
  // TagUntagged creates version tags for all untagged modules.
  rpc TagUntagged(TagUntaggedRequest) returns (TagUntaggedResponse);

  // MovePackages relocates Go packages and rewires all import paths.
  rpc MovePackages(MovePackagesRequest) returns (MovePackagesResponse);

  // ExtractDomain extracts domain types from a handler package into a new pure domain package.
  rpc ExtractDomain(ExtractDomainRequest) returns (ExtractDomainResponse);

  // RunQuality runs the full quality gate synchronously (blocks until done).
  rpc RunQuality(RunQualityRequest) returns (RunQualityResponse);

  // SubmitQuality starts a quality gate run asynchronously and returns a job ID.
  rpc SubmitQuality(RunQualityRequest) returns (SubmitJobResponse);

  // GetJob polls the status of an async job by ID.
  rpc GetJob(GetJobRequest) returns (GetJobResponse);
}

message TagUntaggedRequest {
  string version = 1;
  string message = 2;
  // Optional boundary path (e.g. "customers/example/vault/go").
  // When set, overrides the default goRoot/repoDir/modulePrefix.
  string boundary = 3;
}

message TagResult {
  string tag = 1;
}

message TagUntaggedResponse {
  repeated TagResult created = 1;
  int32 skipped = 2;
}

// Move describes a package relocation.
message Move {
  string from = 1;
  string to = 2;
}

message MoveResult {
  string from = 1;
  string to = 2;
  int32 rewired = 3;
  string error = 4;
}

message MovePackagesRequest {
  repeated Move moves = 1;
  // Optional boundary path (e.g. "customers/example/vault/go").
  // When set, overrides the default goRoot/repoDir/modulePrefix.
  string boundary = 2;
}

message MovePackagesResponse {
  repeated MoveResult results = 1;
}

message ExtractDomainRequest {
  string handler_package = 1;
  string domain_package = 2;
  repeated string files = 3;
  // Optional boundary path (e.g. "customers/example/vault/go").
  // When set, overrides the default goRoot/repoDir/modulePrefix.
  string boundary = 4;
}

message ExtractDomainResponse {
  repeated string symbols = 1;
  repeated string files_moved = 2;
  repeated string files_updated = 3;
}

// RunQualityRequest configures a quality gate run.
message RunQualityRequest {
  // Optional boundary path to scope to a subtree (e.g. "alexandria/go/development").
  string boundary = 1;
  // When true, run on all modules — not just changed ones.
  bool all = 2;
}

// QualityModuleFailure records a single module's failure with captured output.
message QualityModuleFailure {
  string module = 1;
  string output = 2;
}

// RunQualityResponse is the result of a quality gate run.
message RunQualityResponse {
  // True when the quality gate passed.
  bool passed = 1;
  // Human-readable summary (e.g. "quality gate PASSED" or "3 modules failed lint").
  string summary = 2;
  // Per-module failure details (empty when passed is true).
  repeated QualityModuleFailure failures = 3;
}

// SubmitJobResponse is returned when an async job is submitted.
message SubmitJobResponse {
  // Unique ID to poll with GetJob.
  string job_id = 1;
}

// GetJobRequest polls for a job's status.
message GetJobRequest {
  string job_id = 1;
}

// JobStatus is the lifecycle state of an async job.
enum JobStatus {
  // Default value.
  JOB_STATUS_UNSPECIFIED = 0;
  // Queued, not yet started.
  JOB_STATUS_PENDING = 1;
  // Currently executing.
  JOB_STATUS_RUNNING = 2;
  // Finished successfully — result is set.
  JOB_STATUS_DONE = 3;
  // Finished with an error — error is set.
  JOB_STATUS_FAILED = 4;
}

// GetJobResponse returns the current state of an async job.
message GetJobResponse {
  string job_id = 1;
  // Current lifecycle state of the job.
  JobStatus status = 2;
  // Set when status is "done" — the quality gate result.
  RunQualityResponse result = 3;
  // Set when status is "failed" — the error message.
  string error = 4;
}
