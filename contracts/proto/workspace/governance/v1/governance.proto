//
// Workspace governance — validates workspace structure, conventions,
// and dependency hygiene.
//
// Domain:  Workspace
// Concern: Is the workspace well-formed?

syntax = "proto3";

package workspace.governance.v1;

option go_package = "github.com/duizendstra/alexandria/go/contracts/workspace/governance/v1;governancev1";

// GovernanceService validates and maintains workspace health.
service GovernanceService {
  // ScanReadmes checks all READMEs for DDD compliance (Domain + Concern).
  rpc ScanReadmes(ScanReadmesRequest) returns (ScanReadmesResponse);

  // ScanScratch reports scratch folder status across all boundaries.
  rpc ScanScratch(ScanScratchRequest) returns (ScanScratchResponse);

  // EnsureScratch creates missing scratch folders and gitignore entries.
  rpc EnsureScratch(EnsureScratchRequest) returns (EnsureScratchResponse);

  // ScanPurity checks packages for cloud dependencies.
  rpc ScanPurity(ScanPurityRequest) returns (ScanPurityResponse);

  // FixGoVersions updates all go.mod files to the target Go version.
  rpc FixGoVersions(FixGoVersionsRequest) returns (FixGoVersionsResponse);

  // CleanGoSums removes stale checksums from all go.sum files.
  rpc CleanGoSums(CleanGoSumsRequest) returns (CleanGoSumsResponse);
}

// ReadmeStatus reports DDD compliance for a single README.
message ReadmeStatus {
  string path = 1;
  bool pass = 2;
  repeated string issues = 3;
}

message ScanReadmesRequest {
  // Directory to scan. Defaults to workspace alexandria/.
  string directory = 1;
}

message ScanReadmesResponse {
  repeated ReadmeStatus results = 1;
  int32 pass_count = 2;
  int32 fail_count = 3;
}

// ScratchStatus reports the state of one scratch folder.
message ScratchStatus {
  string label = 1;
  bool exists = 2;
  bool gitignored = 3;
}

message ScanScratchRequest {}

message ScanScratchResponse {
  repeated ScratchStatus results = 1;
}

message EnsureScratchRequest {}

message EnsureScratchResponse {
  int32 fixed = 1;
}

// PurityStatus reports cloud dependency analysis for one package.
message PurityStatus {
  string package = 1;
  bool pure = 2;
  repeated string cloud_deps = 3;
}

message ScanPurityRequest {
  // Directory to scan. Defaults to workspace alexandria/go/.
  string directory = 1;
}

message ScanPurityResponse {
  repeated PurityStatus results = 1;
}

message FixGoVersionsRequest {
  string target_version = 1;
}

message GoVersionFix {
  string path = 1;
  string old_version = 2;
}

message FixGoVersionsResponse {
  repeated GoVersionFix results = 1;
}

message CleanGoSumsRequest {
  // Module prefix to clean. Defaults to alexandria module prefix.
  string module_prefix = 1;
}

message GoSumClean {
  string path = 1;
  int32 removed = 2;
}

message CleanGoSumsResponse {
  repeated GoSumClean results = 1;
}
