//
// Spoke identity and registration — every machine (developer laptop,
// CI runner, cloud instance) that participates in the workspace is a
// spoke. Spokes register with the hub and report their capabilities.
//
// Domain:  Workspace
// Concern: How do we identify and track workspace participants?

syntax = "proto3";

package workspace.spoke.v1;

option go_package = "github.com/duizendstra/alexandria/go/contracts/workspace/spoke/v1;spokev1";

// SpokeService manages spoke registration and health.
service SpokeService {
  // Register announces a spoke to the hub.
  rpc Register(RegisterRequest) returns (RegisterResponse);

  // Heartbeat reports spoke health and activity.
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);

  // List returns all known spokes and their status.
  rpc List(ListRequest) returns (ListResponse);
}

// SpokeType identifies what kind of participant this is.
enum SpokeType {
  SPOKE_TYPE_UNSPECIFIED = 0;
  // Human developer machine.
  SPOKE_TYPE_DEVELOPER = 1;
  // AI agent (e.g. Antigravity, Remote).
  SPOKE_TYPE_AGENT = 2;
  // CI runner (GitHub Actions).
  SPOKE_TYPE_CI = 3;
  // Cloud service (Cloud Run).
  SPOKE_TYPE_CLOUD = 4;
}

// Spoke describes a workspace participant.
message Spoke {
  // Unique spoke identifier (stable across sessions).
  string id = 1;
  // Human-readable name (e.g. "jasper-macbook", "antigravity", "ci-runner-1").
  string name = 2;
  // What kind of participant.
  SpokeType type = 3;
  // Machine hostname.
  string hostname = 4;
  // Available resources (e.g. "workspace", "git", "gcp", "github").
  repeated string resources = 5;
  // Last heartbeat timestamp (RFC 3339).
  string last_seen = 6;
  // Current status.
  SpokeStatus status = 7;
}

// SpokeStatus is the current operational state of a spoke.
enum SpokeStatus {
  SPOKE_STATUS_UNSPECIFIED = 0;
  // Spoke is online and active.
  SPOKE_STATUS_ACTIVE = 1;
  // Spoke is online but idle (no active session).
  SPOKE_STATUS_IDLE = 2;
  // Spoke has not heartbeated recently.
  SPOKE_STATUS_STALE = 3;
  // Spoke is syncing with the hub.
  SPOKE_STATUS_SYNCING = 4;
  // Spoke has unresolved conflicts.
  SPOKE_STATUS_CONFLICT = 5;
}

// RegisterRequest announces a spoke to the hub.
message RegisterRequest {
  string name = 1;
  SpokeType type = 2;
  string hostname = 3;
  repeated string resources = 4;
}

// RegisterResponse confirms spoke registration.
message RegisterResponse {
  // Assigned spoke ID (stable, reused on re-registration).
  string spoke_id = 1;
}

// HeartbeatRequest reports ongoing spoke health.
message HeartbeatRequest {
  string spoke_id = 1;
  SpokeStatus status = 2;
  // Number of local commits not yet synced.
  int32 commits_pending = 3;
  // Repos with dirty working trees.
  repeated string dirty_repos = 4;
}

// HeartbeatResponse acknowledges the heartbeat.
message HeartbeatResponse {
  // Actionable events pending for this spoke (from timeline).
  int32 pending_actions = 1;
}

// ListRequest queries known spokes.
message ListRequest {
  // Optional filter by type.
  SpokeType type = 1;
  // Optional filter by status.
  SpokeStatus status = 2;
}

// ListResponse returns known spokes.
message ListResponse {
  repeated Spoke spokes = 1;
}
