syntax = "proto3";

// Package reasoning defines the intelligence layer's planning capability.
//
// Hexagonal: inbound port — consumed by MCP tools (Nous) and services (Kratos).
// CODE phase: Distill — transforms intent + context into actionable plans.
// PARA: Resources — a reusable reasoning capability.
//
// The ReasoningService generates multi-step action plans by combining
// user intent with available context (from MemoryService) and capabilities
// (from SkillsService). It is the "thinking" layer of the second brain.
package intelligence.reasoning.v1alpha1;

option go_package = "github.com/duizendstra/alexandria/go/contracts/intelligence/reasoning/v1alpha1;reasoningv1alpha1";

// Action represents a single step in a reasoning plan.
message Action {
  // The skill to invoke (e.g. "skills/retrieve-memory").
  string skill = 1;
  // Human-readable description of what this step achieves.
  string rationale = 2;
  // Input parameters as a JSON string.
  string input_json = 3;
}

// ReasoningService handles complex, multi-step thinking tasks.
// It plans how to respond to a user request by combining
// available context with the set of available skills.
service ReasoningService {
  // PlanResponse generates a sequence of actions based on intent and context.
  rpc PlanResponse(PlanResponseRequest) returns (PlanResponseResponse);
}

// PlanResponseRequest is the request message for
// [ReasoningService.PlanResponse][intelligence.reasoning.v1alpha1.ReasoningService.PlanResponse].
message PlanResponseRequest {
  // Required. What the user wants to achieve.
  string intent = 1;
  // Optional. Context retrieved from MemoryService or other sources.
  string context = 2;
}

// PlanResponseResponse is the response message for
// [ReasoningService.PlanResponse][intelligence.reasoning.v1alpha1.ReasoningService.PlanResponse].
message PlanResponseResponse {
  // Explanation of the reasoning behind the plan.
  string thought_process = 1;
  // Ordered list of actions to execute.
  repeated Action actions = 2;
}
