//
// Privacy types for generic data anonymization.
// Reusable across domains — billing, contacts, employees, etc.

syntax = "proto3";

package common.privacy.v1alpha1;

option go_package = "github.com/duizendstra/alexandria/go/contracts/common/privacy/v1alpha1;privacyv1alpha1";

// AnonymizeAction defines how a field should be anonymized.
enum AnonymizeAction {
  ANONYMIZE_ACTION_UNSPECIFIED = 0;
  ANONYMIZE_ACTION_HASH = 1; // SHA-256 hash (deterministic, reversible with salt)
  ANONYMIZE_ACTION_REDACT = 2; // Replace with "[REDACTED]"
  ANONYMIZE_ACTION_TRUNCATE = 3; // Keep category, strip detail
  ANONYMIZE_ACTION_KEEP = 4; // No anonymization — field is safe
}

// FieldRule maps a struct field path to an anonymization action.
message FieldRule {
  // Struct field name or dot-separated path (e.g. "ProjectID", "Service.Description").
  string field_path = 1;

  // Action to apply to the field value.
  AnonymizeAction action = 2;

  // Optional truncation level (1 = coarsest). Only used with TRUNCATE.
  int32 truncate_level = 3;
}
