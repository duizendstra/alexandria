syntax = "proto3";

package alx.postmark.v1;

option go_package = "github.com/duizendstra/alexandria/go/contracts/alx/postmark/v1;postmarkv1";

// SendResponse represents Postmark's response after accepting an email.
// Source: https://postmarkapp.com/developer/api/email-api#send-a-single-email
message SendResponse {
  // Recipient email address.
  string to = 1;
  // Timestamp when Postmark accepted the message.
  string submitted_at = 2;
  // Unique message ID assigned by Postmark.
  string message_id = 3;
  // Error code (0 = success).
  int32 error_code = 4;
  // Status message.
  string message = 5;
}
