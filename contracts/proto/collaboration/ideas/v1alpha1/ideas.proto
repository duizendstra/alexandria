syntax = "proto3";

package collaboration.ideas.v1alpha1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/duizendstra/alexandria/go/contracts/collaboration/ideas/v1alpha1;ideasv1alpha1";

// IdeaStatus represents the lifecycle state of an idea.
enum IdeaStatus {
  // Default value. Not a valid status for stored ideas.
  IDEA_STATUS_UNSPECIFIED = 0;
  // Newly captured, awaiting triage.
  IDEA_STATUS_NEW = 1;
  // Actively being refined or worked on.
  IDEA_STATUS_IN_PROGRESS = 2;
  // Completed — ready for promotion to issue or dismissal.
  IDEA_STATUS_DONE = 3;
}

// Idea represents a unit of work or thought.
// Resource name pattern: "ideas/{idea_id}" (AIP-122).
message Idea {
  // Resource name (e.g. "ideas/a1b2c3d4").
  string name = 1;
  // The content of the idea.
  string text = 2;
  // Output only. Creation time.
  google.protobuf.Timestamp create_time = 3;
  // Lifecycle state.
  IdeaStatus status = 4;
}

// IdeasService manages the idea capture lifecycle.
//
// Ideas flow through: Capture → Triage → Promote (to GitHub Issue) or Kill.
service IdeasService {
  // CreateIdea captures a new idea (AIP-133).
  rpc CreateIdea(CreateIdeaRequest) returns (CreateIdeaResponse);
  // GetIdea retrieves an idea by resource name (AIP-131).
  rpc GetIdea(GetIdeaRequest) returns (GetIdeaResponse);
  // ListIdeas returns ideas with optional filtering and pagination (AIP-132).
  rpc ListIdeas(ListIdeasRequest) returns (ListIdeasResponse);
  // UpdateIdea modifies an existing idea's text or status (AIP-134).
  rpc UpdateIdea(UpdateIdeaRequest) returns (UpdateIdeaResponse);
  // DeleteIdea permanently removes an idea (AIP-135).
  rpc DeleteIdea(DeleteIdeaRequest) returns (DeleteIdeaResponse);
}

// CreateIdeaRequest is the request message for
// [IdeasService.CreateIdea][collaboration.ideas.v1alpha1.IdeasService.CreateIdea].
message CreateIdeaRequest {
  // Required. The idea text to capture. Sanitized server-side to strip
  // hidden Unicode characters used in prompt injection.
  string text = 1;
}

// CreateIdeaResponse is the response message for
// [IdeasService.CreateIdea][collaboration.ideas.v1alpha1.IdeasService.CreateIdea].
message CreateIdeaResponse {
  // The created idea, with server-assigned name and create_time.
  Idea idea = 1;
}

// GetIdeaRequest is the request message for
// [IdeasService.GetIdea][collaboration.ideas.v1alpha1.IdeasService.GetIdea].
message GetIdeaRequest {
  // Required. Resource name of the idea (e.g. "ideas/a1b2c3d4").
  string name = 1;
}

// GetIdeaResponse is the response message for
// [IdeasService.GetIdea][collaboration.ideas.v1alpha1.IdeasService.GetIdea].
message GetIdeaResponse {
  // The requested idea.
  Idea idea = 1;
}

// ListIdeasRequest is the request message for
// [IdeasService.ListIdeas][collaboration.ideas.v1alpha1.IdeasService.ListIdeas].
message ListIdeasRequest {
  // Optional. Maximum number of ideas to return. Default 50, max 100 (AIP-158).
  int32 page_size = 1;
  // Optional. Token for the next page of results, returned in a previous
  // [ListIdeasResponse.next_page_token].
  string page_token = 2;
  // Optional. Filter by lifecycle status. IDEA_STATUS_UNSPECIFIED returns all.
  IdeaStatus status = 3;
}

// ListIdeasResponse is the response message for
// [IdeasService.ListIdeas][collaboration.ideas.v1alpha1.IdeasService.ListIdeas].
message ListIdeasResponse {
  // The list of ideas for the current page.
  repeated Idea ideas = 1;
  // Token for the next page. Empty if no more results.
  string next_page_token = 2;
  // Total count of matching ideas, independent of pagination.
  int32 total_size = 3;
}

// UpdateIdeaRequest is the request message for
// [IdeasService.UpdateIdea][collaboration.ideas.v1alpha1.IdeasService.UpdateIdea].
message UpdateIdeaRequest {
  // Required. Resource name of the idea to update.
  string name = 1;
  // Optional. Updated text. Empty string means no change.
  string text = 2;
  // Optional. Updated status. IDEA_STATUS_UNSPECIFIED means no change.
  IdeaStatus status = 3;
}

// UpdateIdeaResponse is the response message for
// [IdeasService.UpdateIdea][collaboration.ideas.v1alpha1.IdeasService.UpdateIdea].
message UpdateIdeaResponse {
  // The updated idea.
  Idea idea = 1;
}

// DeleteIdeaRequest is the request message for
// [IdeasService.DeleteIdea][collaboration.ideas.v1alpha1.IdeasService.DeleteIdea].
message DeleteIdeaRequest {
  // Required. Resource name of the idea to delete.
  string name = 1;
}

// DeleteIdeaResponse is the response message for
// [IdeasService.DeleteIdea][collaboration.ideas.v1alpha1.IdeasService.DeleteIdea].
// Intentionally empty per AIP-135.
message DeleteIdeaResponse {}
