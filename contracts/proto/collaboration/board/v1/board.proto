syntax = "proto3";

package collaboration.board.v1;

option go_package = "github.com/duizendstra/alexandria/go/contracts/collaboration/board/v1;boardv1";

// BoardItem represents an item on a GitHub Projects V2 board.
message BoardItem {
  // GitHub Projects V2 item ID (node ID).
  string id = 1;
  // Item title (typically the issue title).
  string title = 2;
  // Current status column (e.g. "Sprint", "In Progress", "Done").
  string status = 3;
  // URL to the issue or PR this item represents.
  string content_url = 4;
  // Repository in "owner/repo" format.
  string repository = 5;
}

// BoardField represents a field (column) on a Projects V2 board.
message BoardField {
  // GitHub field ID (node ID).
  string id = 1;
  // Field name (e.g. "Status", "Priority", "Pillar").
  string name = 2;
  // Available options for single-select fields.
  repeated BoardFieldOption options = 3;
}

// BoardFieldOption represents one option for a single-select field.
message BoardFieldOption {
  // GitHub option ID.
  string id = 1;
  // Human-readable name (e.g. "Done", "In Progress").
  string name = 2;
}

// BoardService manages GitHub Projects V2 board items.
//
// All owner parameters accept the GitHub organization or user login.
// Project number is the board number visible in the URL.
service BoardService {
  // ListBoardItems returns all items on a board with their current status.
  rpc ListBoardItems(ListBoardItemsRequest) returns (ListBoardItemsResponse);
  // GetBoardFields returns the fields and their options for a board.
  rpc GetBoardFields(GetBoardFieldsRequest) returns (GetBoardFieldsResponse);
  // UpdateBoardItemStatus sets the status of a board item.
  rpc UpdateBoardItemStatus(UpdateBoardItemStatusRequest) returns (UpdateBoardItemStatusResponse);
  // AddItemToBoard adds an issue to a project board.
  rpc AddItemToBoard(AddItemToBoardRequest) returns (AddItemToBoardResponse);
}

// ListBoardItemsRequest is the request message for
// [BoardService.ListBoardItems][collaboration.board.v1.BoardService.ListBoardItems].
message ListBoardItemsRequest {
  // Required. GitHub organization or user login.
  string owner = 1;
  // Required. Project board number.
  int32 project_number = 2;
}

// ListBoardItemsResponse is the response message for
// [BoardService.ListBoardItems][collaboration.board.v1.BoardService.ListBoardItems].
message ListBoardItemsResponse {
  // Board items with current status.
  repeated BoardItem items = 1;
}

// GetBoardFieldsRequest is the request message for
// [BoardService.GetBoardFields][collaboration.board.v1.BoardService.GetBoardFields].
message GetBoardFieldsRequest {
  // Required. GitHub organization or user login.
  string owner = 1;
  // Required. Project board number.
  int32 project_number = 2;
}

// GetBoardFieldsResponse is the response message for
// [BoardService.GetBoardFields][collaboration.board.v1.BoardService.GetBoardFields].
message GetBoardFieldsResponse {
  // Board fields with options.
  repeated BoardField fields = 1;
}

// UpdateBoardItemStatusRequest is the request message for
// [BoardService.UpdateBoardItemStatus][collaboration.board.v1.BoardService.UpdateBoardItemStatus].
message UpdateBoardItemStatusRequest {
  // Required. GitHub organization or user login.
  string owner = 1;
  // Required. Project board number.
  int32 project_number = 2;
  // Required. URL of the issue to update (e.g. "https://github.com/owner/repo/issues/42").
  string issue_url = 3;
  // Required. Target status name (e.g. "Done", "Sprint", "In Progress").
  string status = 4;
}

// UpdateBoardItemStatusResponse is the response message for
// [BoardService.UpdateBoardItemStatus][collaboration.board.v1.BoardService.UpdateBoardItemStatus].
message UpdateBoardItemStatusResponse {
  // The updated board item.
  BoardItem item = 1;
}

// AddItemToBoardRequest is the request message for
// [BoardService.AddItemToBoard][collaboration.board.v1.BoardService.AddItemToBoard].
message AddItemToBoardRequest {
  // Required. GitHub organization or user login.
  string owner = 1;
  // Required. Project board number.
  int32 project_number = 2;
  // Required. URL of the issue to add (e.g. "https://github.com/owner/repo/issues/42").
  string issue_url = 3;
}

// AddItemToBoardResponse is the response message for
// [BoardService.AddItemToBoard][collaboration.board.v1.BoardService.AddItemToBoard].
message AddItemToBoardResponse {
  // The newly added board item.
  BoardItem item = 1;
}
