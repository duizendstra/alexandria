//
// Operation results — structured outcome of any multi-step operation.
// Used by all Chronos MCP tools to report step-by-step progress.
//
// Domain:  Operations
// Concern: How do we report the outcome of tool operations?
//
// See ADR-010: Fat Tools with Structured Step Output.

syntax = "proto3";

package operations.result.v1alpha1;

option go_package = "github.com/duizendstra/alexandria/go/contracts/operations/result/v1alpha1;resultv1alpha1";

// Status is the outcome of an operation or step.
enum Status {
  // Default value — must never be used in practice.
  STATUS_UNSPECIFIED = 0;
  // All steps completed successfully.
  STATUS_OK = 1;
  // One or more steps failed. The operation did not complete.
  STATUS_FAILED = 2;
  // Some steps succeeded, others failed.
  STATUS_PARTIAL = 3;
  // The step was intentionally not executed.
  STATUS_SKIPPED = 4;
}

// Step captures the outcome of a single step within a multi-step operation.
//
// Examples:
//   - {name: "fmt", status: OK}
//   - {name: "lint", status: FAILED, detail: "3 errors in pkg/foo"}
//   - {name: "tag", status: OK, detail: "go/ingestion/v1.3.1"}
//   - {name: "test", status: SKIPPED, detail: "blocked by lint failure"}
message Step {
  // Identifies the step (e.g. "fmt", "vet", "lint", "test", "tag", "push").
  string name = 1;
  // Outcome of this step.
  Status status = 2;
  // Human-readable context (e.g. tag name, error message, count).
  string detail = 3;
}

// OperationResult is the standardized outcome of any Chronos tool operation.
//
// The agent reads summary first. If status is OK, done. If FAILED or PARTIAL,
// drill into steps to find the failing step, then errors for details.
//
// Every Chronos MCP tool returns this envelope (see ADR-010).
message OperationResult {
  // Identifies which action produced this result (e.g. "quality", "build", "fix").
  string action = 1;
  // Overall outcome of the operation.
  Status status = 2;
  // Step-by-step breakdown. Nil/empty for single-step operations.
  repeated Step steps = 3;
  // One-line human-readable summary of the result.
  string summary = 4;
  // Detailed error messages for failed steps.
  repeated string errors = 5;
}
