// Notifications delivers messages to the human operator.
//
// Scrumban: Cross-cutting — enables async communication.
// CODE: Express — the agent expresses its state to the human.
// PARA: Areas — ongoing communication capability.
// Hexagonal: outbound adapter — WhatsApp is an infrastructure concern.
//
// Safety: notifications are ONLY sent to the operator's own WhatsApp
// self-chat ("Message Yourself"). No other recipients are supported.
syntax = "proto3";

package messaging.notifications.v1alpha1;

option go_package = "github.com/duizendstra/alexandria/go/contracts/messaging/notifications/v1alpha1;notificationsv1alpha1";

// Severity indicates urgency of the notification.
enum Severity {
  // Default value.
  SEVERITY_UNSPECIFIED = 0;
  // Informational — FYI, no action needed.
  SEVERITY_INFO = 1;
  // Warning — something is degraded but work continues.
  SEVERITY_WARNING = 2;
  // Blocked — agent cannot proceed without human intervention.
  SEVERITY_BLOCKED = 3;
}

// NotificationService sends messages to the human operator.
//
// All notifications are delivered to WhatsApp self-chat only.
// The agent uses this when it needs human attention.
service NotificationService {
  // Notify sends a message to the operator.
  rpc Notify(NotifyRequest) returns (NotifyResponse);
}

// NotifyRequest is the request for [NotificationService.Notify].
message NotifyRequest {
  // Required. The message to send.
  string message = 1;
  // Optional. Severity level. Defaults to INFO.
  Severity severity = 2;
  // Optional. Context about what the agent was doing.
  string context = 3;
}

// NotifyResponse is the response for [NotificationService.Notify].
message NotifyResponse {
  // Whether the notification was delivered.
  bool delivered = 1;
}
