version: "2"

# Alexandria Library Lint Standard
#
# Same quality bar as the consumer gold standard (.golangci-consumer.yml),
# with adapted dependency rules and complexity limits for a library codebase.
# Differences from consumer config are marked with # LIBRARY:

run:
  timeout: 10m
  concurrency: 4
  modules-download-mode: readonly

output:
  sort-order:
    - file
    - linter

linters:
  enable:
    # ── 1. Core Safety & Bugs ──
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - bodyclose
    - noctx
    - nilerr
    - errorlint
    - fatcontext
    - reassign
    - nilnesserr
    - contextcheck
    - forcetypeassert
    - nilnil
    - wastedassign
    - copyloopvar
    - durationcheck
    - makezero
    - asasalint
    - containedctx
    - canonicalheader
    - errchkjson
    - exhaustive

    # ── 2. Style & Idioms ──
    - revive
    - gocritic
    - goconst
    - unconvert
    - misspell
    - usestdlibvars
    - dupl
    - predeclared
    - godot
    - whitespace
    - nakedret
    - nonamedreturns
    - nlreturn
    - dupword
    - errname
    - dogsled
    - unparam
    - grouper
    - funcorder
    - recvcheck
    - godoclint
    - prealloc
    - decorder
    - musttag

    # ── 3. Complexity ──
    - cyclop
    - funlen
    - nestif
    - maintidx

    # ── 4. Architecture ──
    - gosec
    - depguard
    - ireturn
    - gomoddirectives
    - gochecknoglobals
    - gochecknoinits

    # ── 5. Security ──
    - asciicheck
    - bidichk
    - gocheckcompilerdirectives
    - nosprintfhostport

    # ── 6. Structured Logging ──
    - sloglint
    - loggercheck

    # ── 7. Testing ──
    - testifylint
    - usetesting
    - thelper

    # ── 8. Modernization ──
    - intrange
    - modernize
    - protogetter
    - perfsprint
    - exptostd

    # ── 9. Quality ──
    # LIBRARY: godox allowed — libraries may have TODO for tracked work.
    - lll

    # ── 10. Meta ──
    - nolintlint
    - forbidigo
    - mnd
    - wrapcheck
    - goprintffuncname
    - err113
    - mirror

  settings:
    # LIBRARY: relaxed limits — library functions are richer than composition roots.
    funlen:
      lines: 120
      statements: 60
    cyclop:
      max-complexity: 15
      package-average: 0.0
    nestif:
      min-complexity: 5
    maintidx:
      under: 15
    nakedret:
      max-func-lines: 0
    lll:
      line-length: 160

    revive:
      rules:
        - name: package-comments
        - name: error-naming
        - name: error-strings
        - name: error-return
        - name: var-naming
        - name: receiver-naming

    depguard:
      rules:
        main:
          # LIBRARY: Alexandria can import vetted externals.
          # Consumer config restricts to stdlib + Alexandria only.
          list-mode: strict
          files:
            - "$all"
            - "!$test"
          allow:
            # ── Stdlib ──
            - $gostd

            # ── Internal ──
            - github.com/duizendstra/alexandria

            # ── Vetted externals (see architecture/depguard-vetting.md) ──
            - connectrpc.com/connect
            - google.golang.org
            - cloud.google.com/go
            - golang.org/x
            - gopkg.in/yaml.v3
            - github.com/spf13/cobra
            - github.com/spf13/pflag
            - github.com/spf13/viper
            - github.com/google/uuid
            - github.com/google/go-github
            - github.com/google/go-cmp
            - github.com/bradleyfalzon/ghinstallation/v2
            - github.com/golang-jwt/jwt/v4
            - github.com/modelcontextprotocol/go-sdk
            - go.mau.fi/whatsmeow
            - go.mau.fi/libsignal
            - go.mau.fi/util
            - go.opentelemetry.io
            - github.com/pulumi/pulumi/sdk/v3
            - github.com/pulumi/pulumi-gcp/sdk/v9
            - github.com/pulumi/pulumi-random/sdk/v4
            - github.com/cespare/xxhash/v2
            - github.com/mdp/qrterminal/v3
            - modernc.org/sqlite
          deny:
            - pkg: github.com/OWNER/flow-sdk
              desc: "flow-sdk is deprecated (ADR-002). Migrate to Alexandria."

    ireturn:
      allow:
        - anon
        - error
        - empty
        - stdlib
        - generic
        - "github.com/pulumi/pulumi/sdk/v3/go/pulumi.Resource"

    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance

    sloglint:
      attr-only: true
      key-naming-case: snake

    testifylint:
      enable-all: true

    nolintlint:
      allow-unused: false
      require-explanation: true
      require-specific: true

    gomoddirectives:
      replace-local: false

    godot:
      scope: all

    forbidigo:
      forbid:
        - pattern: "^log\\.(Print|Fatal|Panic).*$"
          msg: "use log/slog for structured logging"

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

  exclude-dirs:
    - gen/
    - staging/

  exclude-rules:
    # Searchtest - gomoddirectives local replacement allowed for submodule development.
    - path: go/discovery/search/searchtest/go\.mod
      linters:
        - gomoddirectives

    # slog-gcp/otelgcp submodule — uses local replace directive for development.
    - path: go/slog-gcp/otelgcp/go\.mod
      linters:
        - gomoddirectives

    # CLI packages — Cobra patterns need globals, inits, and relaxed style.
    - path: go/cli/.*
      linters:
        - gochecknoglobals
        - gochecknoinits
        - forbidigo
        - wrapcheck
        - err113
        - nlreturn
        - gosec
        - revive

    # Console — globals are the API surface.
    - path: go/console/.*
      linters:
        - gochecknoglobals

    # Cloud/GCP — Pulumi orchestrators, trusted subprocess calls.
    - path: go/cloud/.*
      linters:
        - gosec
        - ireturn

    # Registry — trusted file I/O with internal paths.
    - path: go/registry/.*
      linters:
        - gosec

    # identity/api — 'api' is the canonical short name.
    - path: go/identity/identity/api/.*
      linters:
        - revive

    # discovery/privacyfilter — local development replaces are allowed in go.mod.
    - path: (go/discovery/privacyfilter/)?go\.mod
      linters:
        - gomoddirectives

    # Tests — relaxed for readability and test patterns.
    - path: .*_test\.go
      linters:
        - depguard
        - gochecknoglobals
        - gosec
        - errcheck
        - testpackage
        - nonamedreturns
        - nilerr
        - paralleltest
        - wrapcheck
        - err113
        - nlreturn
        - ireturn
        - funlen
        - cyclop
        - maintidx
        - containedctx

    # context.Err() is idiomatically returned unwrapped.
    - linters: [wrapcheck]
      source: "return ctx\\.Err\\(\\)"
