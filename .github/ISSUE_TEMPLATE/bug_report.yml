name: 🐛 Bug Report
description: Report a bug in an Alexandria module.
title: "bug: "
labels: ["bug"]
body:
  - type: dropdown
    id: module
    attributes:
      label: Module Affected
      description: Which Alexandria module is this bug in?
      options:
        - go/slog-gcp
        - Other (specify in description)
    validations:
      required: true

  - type: input
    id: go-version
    attributes:
      label: Go Version
      description: "Output of `go version`"
      placeholder: "go1.26.4 darwin/arm64"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. Import the module ...
        2. Call function ...
        3. Observe error ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened. Include error messages or logs if available.
    validations:
      required: true
