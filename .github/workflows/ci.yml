name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  detect-modules:
    name: Detect Go modules
    runs-on: ubuntu-latest
    outputs:
      modules: ${{ steps.find.outputs.modules }}
      has_modules: ${{ steps.find.outputs.has_modules }}
    steps:
      - uses: actions/checkout@v7

      - id: find
        name: Find Go modules
        run: |
          modules=$(find go/ -name 'go.mod' -printf '%h\n' 2>/dev/null | jq -R -s -c 'split("\n") | map(select(. != ""))')
          if [ "$modules" = "[]" ] || [ -z "$modules" ]; then
            echo "has_modules=false" >> "$GITHUB_OUTPUT"
            echo "modules=[]" >> "$GITHUB_OUTPUT"
            echo "No Go modules found."
          else
            echo "has_modules=true" >> "$GITHUB_OUTPUT"
            echo "modules=$modules" >> "$GITHUB_OUTPUT"
            echo "Found modules: $modules"
          fi

  go:
    name: Test ${{ matrix.module }}
    needs: detect-modules
    if: needs.detect-modules.outputs.has_modules == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.detect-modules.outputs.modules) }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache-dependency-path: |
            ${{ matrix.module }}/go.sum
            ${{ matrix.module }}/go.mod

      - name: Vet
        working-directory: ${{ matrix.module }}
        run: GOWORK=off go vet ./...

      - name: Test
        working-directory: ${{ matrix.module }}
        run: GOWORK=off go test -race -count=1 -coverprofile=coverage.out ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          working-directory: ${{ matrix.module }}

  mod-hygiene:
    name: Module hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Reject replace directives and unresolvable pins
        run: |
          status=0
          while IFS= read -r mod; do
            if grep -qE '^replace ' "$mod"; then
              echo "::error file=$mod::Committed replace directive found. Use published version pins; local cross-module dev goes through an uncommitted go.work."
              status=1
            fi
            if grep -qE 'github.com/duizendstra/alexandria/[^ ]+ v0\.0\.0$' "$mod"; then
              echo "::error file=$mod::Pin of non-existent version v0.0.0. Require a published tag."
              status=1
            fi
          done < <(find go/ -name go.mod)
          exit $status

      - name: Require Dependabot coverage for every module
        run: |
          status=0
          while IFS= read -r dir; do
            if ! grep -q "directory: \"/$dir/\"" .github/dependabot.yml; then
              echo "::error file=.github/dependabot.yml::Missing gomod entry for /$dir/"
              status=1
            fi
          done < <(find go/ -name go.mod -exec dirname {} \;)
          exit $status

  contracts:
    name: Contracts (buf)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: bufbuild/buf-action@v1
        with:
          setup_only: true

      - name: Lint
        working-directory: contracts
        run: buf lint

      - name: Breaking change check
        if: github.event_name == 'pull_request'
        working-directory: contracts
        run: buf breaking --against '../.git#branch=origin/main,subdir=contracts'

      - name: Generated code drift check
        working-directory: contracts
        run: |
          buf generate
          git diff --exit-code ../go/contracts \
            || { echo "::error::go/contracts is stale. Run 'buf generate' in contracts/ and commit the result."; exit 1; }

  docs:
    name: Validate docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Check for broken internal links
        run: |
          status=0
          while IFS= read -r file; do
            while IFS= read -r link; do
              # Skip URLs, anchors, and template placeholders
              if echo "$link" | grep -qE '^(https?://|mailto:|#|\\<)'; then
                continue
              fi
              # Strip anchor from link
              target=$(echo "$link" | sed 's/#.*//')
              if [ -z "$target" ]; then
                continue
              fi
              # Resolve relative to the file's directory
              dir=$(dirname "$file")
              resolved="$dir/$target"
              if [ ! -e "$resolved" ]; then
                echo "::warning file=$file::Broken link: $link (resolved: $resolved)"
                status=1
              fi
            done < <(grep -oP '\[.*?\]\(\K[^)]+' "$file" 2>/dev/null)
          done < <(find . -name '*.md' -not -path './.git/*')
          exit $status
